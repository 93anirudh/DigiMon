name: Build DigiMon

on:
  push:
    branches: [feat/google-oauth]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & package portable .exe
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify renderer paths are relative (blank-screen guard)
        shell: pwsh
        run: |
          $html = Get-Content dist/index.html -Raw
          if ($html -match 'src="/assets/' -or $html -match 'href="/assets/') {
            Write-Error "❌ Absolute asset paths found in dist/index.html — would cause blank screen in production"
            exit 1
          }
          Write-Host "✅ Asset paths are relative — renderer will load under file:// protocol"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: DigiMon-portable
          path: release/*.exe
          if-no-files-found: error

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: DigiMon — latest build
          files: release/*.exe
          prerelease: true
          make_latest: true
