<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Gradient background matching Aetheris theme -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818CF8"/>
      <stop offset="50%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square with gradient -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Glossy highlight overlay -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Bold "D" monogram, centered -->
  <text x="256" y="356"
        font-family="Inter, -apple-system, Segoe UI, sans-serif"
        font-weight="700"
        font-size="320"
        fill="white"
        text-anchor="middle"
        letter-spacing="-12">D</text>

  <!-- Tiny accent orb bottom-right — the "agent" signifier -->
  <circle cx="408" cy="408" r="28" fill="#A855F7" opacity="0.85"/>
  <circle cx="400" cy="400" r="8"  fill="#FFFFFF" opacity="0.6"/>
</svg>
